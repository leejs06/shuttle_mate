spring.application.name=shuttle_mate

# 서버 실행 포트 지정
server.port=${PORT:80}

# DB 드라이버 지정
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# DB 연결 주소 및 DB 계정 정보
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# 메일 서버 설정 (Gmail 기준)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${EMAIL_USERNAME}
# 중요: 일반 비밀번호가 아니라 구글 '앱 비밀번호'를 발급받아 넣어야 함
spring.mail.password=${EMAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# MyBatis 설정
# xml 매퍼 파일 위치 (src/main/resources/sqlmap/mapper/*.xml)
mybatis.mapper-locations=classpath:sqlmap/mapper/**/*.xml

# 스네이크 케이스를 카멜 케이스로 자동 변환 설정
mybatis.configuration.map-underscore-to-camel-case=true

# 문자 인코딩 설정
spring.messages.encoding=UTF-8

